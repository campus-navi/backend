spring:
  application:
    name: campus-navi-backend

  jackson:
    time-zone: Asia/Seoul

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true

recommend:
  feed:
    w1: 0.30
    w2: 0.30
    w3: 0.40
    w2-admission: 0.4
    w2-grade: 0.6
    view-cap: 30
    candidate-limit: 200
    result-limit: 5
    freshness-days: 14

springdoc:
  api-docs:
    path: /api/api-docs
  swagger-ui:
    path: /api/swagger-ui
    tags-sorter: alpha