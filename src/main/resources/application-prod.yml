spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

springdoc:
  swagger-ui:
    enabled: false

app:
  crawl:
    enabled: true

  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: ${JWT_ACCESS_EXPIRATION:30m}
    refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:14d}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

  email:
    from: ${AWS_SES_FROM}
    aws-region: ${AWS_REGION}

  cookie:
    secure: true
    same-site: none

  storage:
    s3:
      bucket: ${S3_BUCKET}
      region: ${S3_REGION}
      access-key: ${S3_ACCESS_KEY}
      secret-key: ${S3_SECRET_KEY}
      endpoint:
      path-style-access: ${S3_PATH_STYLE:false}
      base-url: ${S3_BASE_URL}

  ai:
    server:
      base-url: ${AI_SERVER_URL}
      connect-timeout: 5s
      response-timeout: 30s
      connection-request-timeout: 5s
      max-total: 100
      max-per-route: 50

  admin:
    bootstrap:
      enabled: ${ADMIN_BOOTSTRAP_ENABLED:false}
      username: ${ADMIN_USERNAME:}
      password: ${ADMIN_PASSWORD:}
      email: ${ADMIN_EMAIL:}
      nickname: ${ADMIN_NICKNAME:}
      university-id: ${ADMIN_UNIVERSITY_ID:0}
