spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

springdoc:
  swagger-ui:
    enabled: false

app:
  crawl:
    enabled: true

  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: ${JWT_ACCESS_EXPIRATION}
    refresh-token-expiration: ${JWT_REFRESH_EXPIRATION}

  cors:
    allowed-origins:
      - allowed-origin

  email:
    from: ${AWS_SES_FROM}
    aws-region: ${AWS_REGION}

  cookie:
    secure: true
    same-site: none

  storage:
    s3:
      bucket: ${S3_BUCKET}
      region: ${S3_REGION}
      access-key: ${S3_ACCESS_KEY}
      secret-key: ${S3_SECRET_KEY}
      endpoint:
      path-style-access: ${S3_PATH_STYLE:false}
      base-url: ${S3_BASE_URL}

  ai:
    server:
      url: ${AI_SERVER_URL}
      timeout: 30s