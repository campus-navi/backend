name: Build and Push to ECR

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "Dockerfile"
      - "gradlew"
      - ".github/workflows/forEcr.yml"
      - "gradle/**"

permissions:
  id-token: write
  contents: read

jobs:
  push-ecr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Grant permission
        run: chmod +x ./gradlew

      - name: Build jar
        run: ./gradlew build -x test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::154959837798:role/GitHubActionsForEcr
          aws-region: ap-northeast-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: setting of qemu #Actions 환경이 amd64환경이기에 arm환경을 작동시키기위해선 qemu 에뮬레이션이 필요하다
        uses: docker/setup-qemu-action@v3

      - name: Setting of buildx #amd64 , arm 64 호환성 
        uses: docker/setup-buildx-action@v3

      - name: Build, tag, and push image
        uses: docker/build-push-action@v5
        with:
            context: .
            push: true
            platforms: linux/amd64, linux/arm64
            tags: ${{ steps.login-ecr.outputs.registry }}/campus-navi-backend-server:prod-${{ github.sha }}